<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>トレーラーハウス メーカーナビ｜北海道キャンプ場開業・投資サポート</title>
    <style>
        /* 前回のCSSを継承し、パークホームズ用のスタイルを追加 */
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #e11d48;
            --hokkaido-green: #166534;
            --bg-slate: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius-lg: 16px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg-slate); color: var(--text-main); line-height: 1.6; }
        header { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 700; font-size: 1.25rem; color: var(--primary); text-decoration: none; }
        .hero { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: white; padding: 4rem 1.5rem; text-align: center; }
        .tabs-wrapper { background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 60px; z-index: 90; }
        .tabs { max-width: 1200px; margin: 0 auto; display: flex; }
        .tab-btn { flex: 1; padding: 1.25rem; border: none; background: none; cursor: pointer; font-weight: 700; color: var(--text-muted); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .container { max-width: 1200px; margin: 0 auto; padding: 3rem 1.5rem; }
        .section { display: none; }
        .section.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .card { background: white; border-radius: var(--radius-lg); padding: 2rem; border: 1px solid #e2e8f0; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .featured-tag { position: absolute; top: -10px; right: 20px; background: var(--hokkaido-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .btn-reserve { display: block; width: 100%; text-align: center; background: var(--primary); color: white; padding: 0.8rem; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 1.5rem; }
        .table-scroll { overflow-x: auto; background: white; border-radius: var(--radius-lg); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem; }
        footer { background: #0f172a; color: white; padding: 4rem 1.5rem; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <a href="#" class="logo">🏔️ TRAILER NAVI</a>
        <nav><a href="https://trailer-house-hokkaido.com/for-investment/reservation" style="text-decoration:none; color:var(--primary); font-weight:700;">開業相談はこちら</a></nav>
    </div>
</header>

<section class="hero">
    <h1>北海道キャンプ場開業・投資ガイド</h1>
    <p>パークホームズ、THD、ルクラ等、主要メーカーの最新情報。寒冷地仕様の比較から展示場予約まで。</p>
</section>

<div class="tabs-wrapper">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('makers')">主要メーカー</button>
        <button class="tab-btn" onclick="switchTab('showrooms')">全国展示会場</button>
        <button class="tab-btn" onclick="switchTab('compare')">スペック比較</button>
    </div>
</div>

<main class="container">
    <section id="makers" class="section active">
        <div class="grid" id="makers-grid"></div>
    </section>

    <section id="showrooms" class="section">
        <div class="grid" id="showroom-grid"></div>
    </section>

    <section id="compare" class="section">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>メーカー</th>
                        <th>得意分野</th>
                        <th>寒冷地仕様</th>
                        <th>車検/法規制</th>
                        <th>特徴的な機能</th>
                    </tr>
                </thead>
                <tbody id="compare-tbody"></tbody>
            </table>
        </div>
    </section>
</main>

<footer>
    <p>&copy; 2026 トレーラーハウス メーカーナビ｜北海道キャンプ場開業サポート</p>
</footer>

<script>
    const makers = [
        {
            name: "株式会社パークホームズ",
            short: "パークホームズ",
            tags: ["グランピング", "宿泊", "フルオーダー"],
            desc: "仙台本社の寒冷地基準メーカー。アメリカンデザインと高断熱性能を両立。スライドアウト機構で広々とした宿泊空間を実現。",
            featured: true,
            coldSpec: "✅ 全機種標準（高断熱）",
            legal: "車両扱い（建築確認不要）",
            feature: "SNS映えするデザイン / スライドアウト",
            url: "https://www.parkhomes.jp/"
        },
        {
            name: "トレーラーハウスデベロップメント (THD)",
            short: "THD",
            tags: ["宿泊", "店舗", "オフィス"],
            desc: "国内シェアNO.1。車検付車両にこだわり、北海道内のキャンプ場設置実績も豊富。自治体協議にも強い。",
            featured: true,
            coldSpec: "✅ 対応可",
            legal: "全車車検取得",
            feature: "高いコンプライアンス / 全国網",
            url: "https://www.trailer-house.co.jp/"
        },
        {
            name: "ルクラ株式会社 (Lukura)",
            short: "ルクラ",
            tags: ["店舗", "美容院", "宿泊"],
            desc: "愛知県拠点。デザイン性の高い店舗型に強み。女性ターゲットの施設に最適な空間作りが得意。",
            featured: false,
            coldSpec: "⚠️ オプション対応",
            legal: "車検対応可",
            feature: "店舗内装のクオリティ",
            url: "https://www.lukura.jp/"
        }
    ];

    const showrooms = [
        { name: "パークホームズ 仙台本店", maker: "パークホームズ", addr: "宮城県仙台市", url: "https://www.parkhomes.jp/" },
        { name: "パークホームズ 青森店 (実例あり)", maker: "パークホームズ", addr: "青森県むつ市", url: "https://www.parkhomes.jp/" },
        { name: "北海道 苫小牧展示場", maker: "THD", addr: "北海道苫小牧市", url: "https://trailer-house-hokkaido.com/for-investment/reservation" },
        { name: "パークホームズ 茨城・千葉・東京", maker: "パークホームズ", addr: "関東各拠点", url: "https://www.parkhomes.jp/" },
        { name: "ルクラ 豊橋ショールーム", maker: "ルクラ", addr: "愛知県豊橋市", url: "https://www.lukura.jp/reservation/" }
    ];

    function renderMakers() {
        const grid = document.getElementById('makers-grid');
        grid.innerHTML = makers.map(m => `
            <div class="card">
                ${m.featured ? '<div class="featured-tag">北海道推奨</div>' : ''}
                <span class="badge badge-blue">${m.tags.join(' / ')}</span>
                <h3>${m.name}</h3>
                <p style="font-size: 0.9rem; margin-bottom: 1rem;">${m.desc}</p>
                <ul style="font-size: 0.8rem; color: #64748b; margin-bottom: 1.5rem; list-style:none;">
                    <li>❄️ 寒冷地: ${m.coldSpec}</li>
                    <li>💰 税制: 4年定率法適用可</li>
                </ul>
                <a href="${m.url}" target="_blank" style="color:var(--primary); font-weight:700;">公式サイト ↗</a>
            </div>
        `).join('');
    }

    function renderShowrooms() {
        const grid = document.getElementById('showroom-grid');
        grid.innerHTML = showrooms.map(s => `
            <div class="card">
                <span class="badge" style="background:#f1f5f9;">展示会場</span>
                <h3 style="font-size: 1.1rem;">${s.name}</h3>
                <p style="font-size: 0.85rem; color: #64748b;">運営: ${s.maker}</p>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">📍 ${s.addr}</p>
                <a href="${s.url}" target="_blank" class="btn-reserve">見学・現地調査を予約</a>
            </div>
        `).join('');
    }

    function renderCompare() {
        const tbody = document.getElementById('compare-tbody');
        tbody.innerHTML = makers.map(m => `
            <tr>
                <td><strong>${m.short}</strong></td>
                <td>${m.tags[0]}</td>
                <td>${m.coldSpec}</td>
                <td>${m.legal}</td>
                <td>${m.feature}</td>
            </tr>
        `).join('');
    }

    function switchTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    renderMakers();
    renderShowrooms();
    renderCompare();
</script>

</body>
</html>
