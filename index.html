<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式会社渡部製作所 | 資産価値を最大化する次世代トレーラーハウス</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;700;900&family=Outfit:wght@700;800;900&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fdfcfb; 
            color: #433322; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        .serif { font-family: 'Noto Serif JP', serif; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); }
        
        .gold-shine {
            background: linear-gradient(90deg, #8B5E2E, #D4AF37, #8B5E2E);
            background-size: 200% auto;
            animation: gold-shine-move 4s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        @keyframes gold-shine-move {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .shape-blob { 
            background: #f5f0e8; 
            border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; 
            filter: blur(40px); 
            animation: move-blob 15s infinite alternate; 
        }
        
        @keyframes move-blob { 
            from { transform: translate(0, 0) scale(1); } 
            to { transform: translate(15px, 25px) scale(1.05); } 
        }

        .price-number {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            letter-spacing: -0.01em;
        }

        /* 改行位置の適正化と視認性の向上 */
        .text-balanced {
            text-wrap: balance;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const Logo = ({ className }) => (
            <div className={`flex items-center ${className}`}>
                <img src="logo_brown.svg" alt="株式会社渡部製作所" className="h-9 md:h-14 w-auto object-contain" />
            </div>
        );

        const apiKey = "";

        const GeneratedImage = ({ prompt, className, alt, fallbackUrl }) => {
          const [imageUrl, setImageUrl] = useState(null);
          const [loading, setLoading] = useState(true);

          const generateImage = useCallback(async () => {
            if (!apiKey) {
              setImageUrl(fallbackUrl);
              setLoading(false);
              return;
            }
            setLoading(true);
            try {
              const response = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    instances: [{ prompt: prompt }],
                    parameters: { sampleCount: 1 }
                  }),
                }
              );
              if (!response.ok) throw new Error('Generation failed');
              const result = await response.json();
              setImageUrl(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
            } catch (err) {
              setImageUrl(fallbackUrl);
            } finally {
              setLoading(false);
            }
          }, [prompt, fallbackUrl]);

          useEffect(() => { generateImage(); }, [generateImage]);

          return (
            <div className={`${className} bg-stone-100 relative overflow-hidden group`}>
              {loading ? (
                <div className="absolute inset-0 flex items-center justify-center bg-stone-50">
                  <div className="w-8 h-8 border-2 border-stone-200 border-t-[#8B5E2E] rounded-full animate-spin"></div>
                </div>
              ) : (
                <img src={imageUrl} alt={alt} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
              )}
            </div>
          );
        };

        const App = () => {
            const [viewMode, setViewMode] = useState('investment'); 
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 40);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const content = {
                investment: {
                    tag: "個人のお客様・資産運用",
                    titleLines: ["一生に一度を、", "もっと自由に。"],
                    sub: "木のぬくもりを活かした「可動産」戦略。短期レンタルから完全カスタム設計、期間中の途中買取まで。富裕層向けの柔軟な投資プランをご提案します。",
                    img: "img04.jpg",
                },
                infrastructure: {
                    tag: "自治体様・防災インフラ",
                    titleLines: ["最強の防災拠点を、", "瞬時に配置。"],
                    sub: "有事に完全自律するインフラを、平時は地域の賑わい拠点に。オフグリッド技術で命を守るモバイルクリニックを、自治体との連携実績と共に提案します。",
                    img: "img01.jpg",
                }
            };
            const current = content[viewMode];

            return (
                <div className="min-h-screen selection:bg-stone-900 selection:text-white">
                    
                    {/* グローバル・キャンペーンバナー */}
                    <div className="w-full bg-[#8B5E2E] text-white py-2 px-4 text-center sticky top-0 z-[60] shadow-md">
                        <p className="text-[9px] md:text-xs font-bold tracking-[0.05em] flex items-center justify-center gap-1.5">
                            <span className="bg-white text-[#8B5E2E] px-1.5 py-0.5 rounded-sm text-[8px] font-black uppercase">特別価格</span>
                            <span>2026年7月限定 先着10名様 1ヶ月10万円お試しプラン実施中</span>
                            <Icon name="chevron-right" className="w-3 h-3" />
                        </p>
                    </div>

                    {/* ナビゲーション (スマホ対応強化) */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'glass py-2 shadow-sm' : 'bg-transparent py-4 md:py-6'} top-0 mt-8 md:mt-10`}>
                        <div className="max-w-7xl mx-auto px-4 md:px-8 flex justify-between items-center">
                            <Logo />
                            <div className="flex items-center gap-2 md:gap-6">
                                <div className="flex bg-stone-200/50 p-0.5 rounded-full border border-stone-200 text-stone-500 font-bold">
                                    <button onClick={() => setViewMode('investment')} className={`px-3 md:px-5 py-1.5 rounded-full text-[9px] md:text-[10px] transition-all ${viewMode === 'investment' ? 'bg-[#8B5E2E] text-white shadow-sm' : ''}`}>個人のお客様</button>
                                    <button onClick={() => setViewMode('infrastructure')} className={`px-3 md:px-5 py-1.5 rounded-full text-[9px] md:text-[10px] transition-all ${viewMode === 'infrastructure' ? 'bg-stone-800 text-white shadow-sm' : ''}`}>自治体様</button>
                                </div>
                                <button className="hidden md:block px-6 py-2.5 bg-[#8B5E2E] text-white text-[11px] font-bold rounded-full hover:bg-[#6D4924] transition-all">お問い合わせ</button>
                            </div>
                        </div>
                    </nav>

                    {/* ヒーローセクション (スマホの文字サイズを最適化) */}
                    <section className="relative min-h-[85vh] md:min-h-[90vh] flex items-center pt-24 md:pt-40 pb-16 overflow-hidden bg-[#fdfcfb]">
                        <div className="absolute top-1/4 -right-10 w-[260px] md:w-[600px] h-[260px] md:h-[600px] shape-blob opacity-40"></div>
                        <div className="max-w-7xl mx-auto px-5 md:px-8 relative z-10 grid lg:grid-cols-2 gap-10 md:gap-16 items-center">
                            <div className="space-y-6 md:space-y-10 text-left">
                                <div className="space-y-3 md:space-y-4">
                                    <div className="inline-flex items-center gap-2 px-3 py-1 bg-[#8B5E2E]/10 text-[#8B5E2E] rounded-full">
                                        <Icon name="award" className="w-3 h-3" />
                                        <span className="text-[9px] md:text-[10px] font-black tracking-widest uppercase">{current.tag}</span>
                                    </div>
                                    <h2 className="text-3xl sm:text-5xl md:text-7xl lg:text-8xl font-black tracking-tight leading-[1.2] text-stone-900 serif italic text-balanced">
                                        {current.titleLines.map((line, idx) => (<span key={idx} className="block md:inline-block">{line}</span>))}
                                    </h2>
                                </div>
                                <p className="text-sm md:text-xl text-stone-600 max-w-lg leading-relaxed font-light text-balanced">{current.sub}</p>
                                
                                <div className="space-y-6">
                                    <div className="bg-white border border-stone-100 p-5 md:p-6 rounded-2xl max-w-md shadow-sm relative overflow-hidden">
                                        <div className="absolute top-0 right-0 bg-[#8B5E2E] text-white text-[8px] px-2.5 py-1 rounded-bl-lg font-bold tracking-widest uppercase">Special</div>
                                        <div className="space-y-2.5 text-left">
                                            <p className="text-[10px] font-bold text-stone-400 tracking-wider">先着10名様 特別価格（2026年7月）</p>
                                            <div className="flex items-baseline gap-1">
                                                <span className="text-xs font-bold text-stone-900">1ヶ月</span>
                                                <span className="price-number text-3xl md:text-5xl gold-shine ml-1.5">10</span>
                                                <span className="text-lg font-black text-stone-900 ml-0.5">万円</span>
                                                <span className="text-[9px] font-bold text-[#8B5E2E] ml-1">(税込)〜</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-4 pt-2">
                                        <button className="px-8 py-4 bg-stone-900 text-white font-bold uppercase tracking-widest text-[11px] rounded-full shadow-lg hover:bg-stone-800 transition-all flex items-center justify-center gap-3">プランを相談する <Icon name="arrow-right" className="w-4 h-4" /></button>
                                    </div>
                                </div>
                            </div>
                            <div className="relative order-first lg:order-last">
                                <div className="relative z-10 aspect-[4/3] md:aspect-[4/5] rounded-2xl md:rounded-[3rem] overflow-hidden shadow-xl border-[6px] md:border-[16px] border-white group">
                                    <img src={current.img} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" alt="渡部製作所 活用実例" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
                                    <div className="absolute bottom-4 md:bottom-10 left-4 md:left-10 text-white text-left">
                                        <p className="text-[8px] md:text-[10px] font-black tracking-widest uppercase opacity-70 mb-1 font-mono">Real Project Portfolio</p>
                                        <h4 className="text-lg md:text-3xl font-bold serif italic leading-tight">{viewMode === 'investment' ? 'Lifestyle Innovation' : 'Social Infrastructure'}</h4>
                                    </div>
                                </div>
                                <div className="absolute -top-3 -right-3 md:-top-6 md:-right-6 w-20 md:w-32 h-20 md:h-32 bg-[#8B5E2E] text-white rounded-full flex flex-col items-center justify-center border-4 md:border-8 border-white shadow-xl rotate-12 font-black">
                                    <span className="text-[7px] md:text-[9px] opacity-70 uppercase tracking-tighter">Asset Value</span>
                                    <span className="text-sm md:text-xl outfit leading-none my-0.5">2YRS</span>
                                    <span className="text-[7px] md:text-[9px]">最短2年償却</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* 製品ラインナップ (サウナ画像 img07 採用) */}
                    <section id="lineup" className="py-16 md:py-32 bg-stone-50">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-12 md:mb-24 space-y-3">
                                <h3 className="text-3xl md:text-5xl font-black italic serif tracking-tight">製品ラインナップ</h3>
                                <p className="text-stone-400 font-bold text-[10px] tracking-[0.3em] uppercase">Product Portfolio</p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-6 md:gap-10">
                                {/* サウナ専用モデル：img07 採用 */}
                                <div className="group bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col h-full hover:shadow-xl transition-all">
                                    <div className="aspect-[4/3] overflow-hidden">
                                        <img 
                                          src="img07.jpg" 
                                          alt="サウナ専用モデル 外観"
                                          className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110"
                                        />
                                    </div>
                                    <div className="p-6 md:p-8 text-left flex-grow">
                                        <div className="text-[9px] font-black text-[#8B5E2E] tracking-widest uppercase mb-1 font-mono">Sauna & Outdoor Bath</div>
                                        <h4 className="text-lg md:text-xl font-bold serif italic mb-3 text-stone-900">サウナ専用モデル</h4>
                                        <p className="text-xs text-stone-500 leading-relaxed font-light">
                                            檜の香りに包まれる本格サウナとシャワー。川沿いや森の中など、場所を選ばず極上の「ととのい」空間を実現。ミリ単位の自由設計で、あなたの理想を形にします。
                                        </p>
                                    </div>
                                </div>

                                <div className="group bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col h-full hover:shadow-xl transition-all">
                                    <div className="aspect-[4/3] overflow-hidden">
                                        <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=800" className="w-full h-full object-cover transition-all group-hover:scale-110" alt="高規格トイレ棟" />
                                    </div>
                                    <div className="p-6 md:p-8 text-left flex-grow">
                                        <div className="text-[9px] font-black text-[#8B5E2E] tracking-widest uppercase mb-1 font-mono">Toilet Unit</div>
                                        <h4 className="text-lg md:text-xl font-bold serif italic mb-3 text-stone-900">高規格トイレ棟</h4>
                                        <p className="text-xs text-stone-500 leading-relaxed font-light">これまでの概念を覆す清潔でおしゃれな内装。イベント会場や公園の資産価値を高める、次世代の公共インフラ。メンテナンス性も追求しています。</p>
                                    </div>
                                </div>

                                <div className="group bg-white rounded-2xl overflow-hidden shadow-sm flex flex-col h-full hover:shadow-xl transition-all">
                                    <div className="aspect-[4/3] overflow-hidden">
                                        <img src="img03.jpg" className="w-full h-full object-cover transition-all group-hover:scale-110" alt="宿泊・別荘モデル" />
                                    </div>
                                    <div className="p-6 md:p-8 text-left flex-grow">
                                        <div className="text-[9px] font-black text-[#8B5E2E] tracking-widest uppercase mb-1 font-mono">Villa Unit</div>
                                        <h4 className="text-lg md:text-xl font-bold serif italic mb-3 text-stone-900">宿泊・別荘モデル</h4>
                                        <p className="text-xs text-stone-500 leading-relaxed font-light">4名定員の快適な個室。キッチン、シャワー完備。固定資産税がかからない「動く邸宅」として、新たな収益物件やセカンドハウスに最適です。</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* お問い合わせ (スマホでの視認性を改善) */}
                    <section id="contact" className="py-24 md:py-40 bg-stone-900 text-white text-center relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] md:w-[800px] h-[300px] md:h-[800px] shape-blob opacity-10"></div>
                        <div className="max-w-4xl mx-auto px-6 relative z-10 space-y-8 md:space-y-12 text-left sm:text-center">
                            <h3 className="text-3xl md:text-8xl lg:text-9xl font-black italic serif tracking-tighter leading-tight uppercase">Start Small, <br/><span className="text-[#8B5E2E]">Own Future.</span></h3>
                            <p className="text-sm md:text-xl text-stone-400 font-light max-w-2xl mx-auto leading-relaxed italic text-balanced">1ヶ月のレンタルから始まる、新しい資産形成の形。理想の空間を、今すぐあなたの場所に。資料請求・オンライン相談承ります。</p>
                            <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                                <button className="px-8 py-5 bg-white text-black font-bold uppercase tracking-widest text-[10px] rounded-full hover:scale-105 transition-all">個人のお客様 相談窓口</button>
                                <button className="px-8 py-5 border border-stone-700 text-white font-bold uppercase tracking-widest text-[10px] rounded-full hover:bg-stone-800 transition-all">自治体様 防災計画窓口</button>
                            </div>
                            <div className="pt-4 text-center">
                                <a href="tel:0120-86-7550" className="text-xl md:text-4xl font-black outfit hover:text-[#8B5E2E] transition-colors flex items-center justify-center gap-3">
                                    <Icon name="phone" className="w-6 h-6 md:w-8 md:h-8" />0120-86-7550
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* フッター */}
                    <footer className="py-16 md:py-24 bg-stone-50 border-t border-stone-200">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex flex-col md:flex-row justify-between items-start gap-12 md:gap-16 mb-12 text-left">
                                <div className="space-y-6">
                                    <Logo />
                                    <div className="space-y-3">
                                        <p className="text-stone-900 font-black italic text-lg uppercase outfit">株式会社 渡部製作所</p>
                                        <div className="space-y-1 text-[11px] md:text-xs text-stone-500 tracking-tight leading-relaxed font-medium">
                                            <p className="font-bold text-stone-700">代表取締役：渡部 耕平</p>
                                            <p>〒004-0842 札幌市清田区清田2条2丁目3番1号</p>
                                            <p>電話番号：0120-86-7550 / 011-881-3512</p>
                                            <p className="flex items-center gap-2">
                                                公式サイト：<a href="https://house-ws.com/" target="_blank" className="text-[#8B5E2E] font-bold hover:underline">house-ws.com</a>
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-x-12 gap-y-8 w-full md:w-auto font-bold text-stone-400">
                                    <div className="space-y-3">
                                        <p className="text-[#8B5E2E] text-[10px] font-black uppercase tracking-widest">MENU</p>

        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
